# orderstock — PRODUCTION compose (Linux host, behind an existing caddy-gen reverse proxy).
# Serves the app at https://orderstock.krs.co.th — its own subdomain, served at the domain root
# (no basePath). NO host port is published; all ingress is via the caddy-gen labels below.
# Deploy from /opt/orderstock.
#
# ============================================================================================
#  DEPLOY VALUES — filled in for the krs.co.th host (2026-07-11):
#    caddy network  = caddy-gen-proxy_default  (networks.caddy.name, below)
#    TLS/ACME email = limweb@hotmail.com       (virtual.tls-email label, below)
#    subdomain host = orderstock.krs.co.th     (virtual.host label; DNS A-record → 141.98.17.91 done)
#  DB NOTE: production points at the customer's EXTERNAL shared ERP database db_TCL — see
#  process/context/database/all-database.md §DANGER guardrails (never migrate-reset that DB).
#  The OrderSheet.active column (soft-delete) has been applied to db_TCL via
#  db/alter-ordersheet-add-active.sql.
# ============================================================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    labels:
      # caddy-gen picks up these labels to route orderstock.krs.co.th → this container:3000.
      # A dedicated subdomain serves the app at the domain root — no path matcher, no prefix to
      # forward or strip. (A DNS A-record orderstock.krs.co.th → this host must exist first.)
      virtual.host: "orderstock.krs.co.th"
      virtual.port: "3000"
      virtual.tls-email: "limweb@hotmail.com"
    # Runtime secrets + config from the host .env (gitignored, .dockerignore-excluded from the image).
    env_file:
      - .env
    volumes:
      # WRITABLE bind-mount: the /settings/db page rewrites DATABASE_URL in this file and keeps a
      # .env.bak beside it. Bind-mount (not COPY) so the rewrite + backup persist on the host and
      # survive restarts. Pairs with restart:unless-stopped to apply the settings-page process.exit(0).
      - ./.env:/app/.env
    restart: unless-stopped
    networks:
      - caddy
    # NO `ports:` block — ingress is via caddy-gen labels only (host 3000 may be taken by qtso-app).

networks:
  caddy:
    external: true
    # The real external network name the caddy-gen container is attached to.
    name: "caddy-gen-proxy_default"
